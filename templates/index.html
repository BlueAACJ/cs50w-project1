{% extends "layout.html" %}

{% block title %}
  index
{% endblock %}

{% block main %}
  {% if session.id and libros %}    
    <table class="table">
      <thead> 
        <tr>
          <th scope="col">ISBN</th>
          <th scope="col">Titulo</th>
          <th scope="col">Autor</th>
          <th scope="col">Ano</th>
        </tr>
      </thead>
      <tbody>
        {% for i in libros %}
          <tr>
            <td>{{i.isbn}}</td>
            <td>{{i.title}}</td>
            <td>{{i.author}}</td>
            <td>{{i.year}}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <img src="/static/images/fondo.jpg" class="img-fluid" alt="...">
  {% endif %}
{% endblock %}
